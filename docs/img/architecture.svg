<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 450" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="920" height="450" fill="#0b0e12"/>
  <text x="24" y="30" fill="#6fb2d6" font-size="15" letter-spacing="2">LAPLACE</text>
  <text x="112" y="30" fill="#5a6571" font-size="13">· warehouse decision twin</text>

  <!-- band 1: ask -> experiment -> answer -->
  <text x="24" y="62" fill="#5a6571" font-size="10" letter-spacing="1.5">ASK  →  EXPERIMENT  →  ANSWER</text>
  <g>
    <rect x="24"  y="72" width="172" height="58" rx="9" fill="#10151b" stroke="#223039"/>
    <text x="110" y="98"  fill="#d6dee6" font-size="12.5" text-anchor="middle">You ask</text>
    <text x="110" y="115" fill="#76828f" font-size="10.5" text-anchor="middle">in plain English</text>

    <rect x="250" y="72" width="172" height="58" rx="9" fill="#10151b" stroke="#6fb2d6"/>
    <text x="336" y="98"  fill="#d6dee6" font-size="12.5" text-anchor="middle">LLM agent</text>
    <text x="336" y="115" fill="#76828f" font-size="10.5" text-anchor="middle">designs experiments</text>

    <rect x="476" y="72" width="172" height="58" rx="9" fill="#10151b" stroke="#223039"/>
    <text x="562" y="98"  fill="#d6dee6" font-size="12.5" text-anchor="middle">Fast DES</text>
    <text x="562" y="115" fill="#76828f" font-size="10.5" text-anchor="middle">paired rollouts (CRN)</text>

    <rect x="702" y="72" width="172" height="58" rx="9" fill="#10151b" stroke="#6fb2d6"/>
    <text x="788" y="98"  fill="#d6dee6" font-size="12.5" text-anchor="middle">Answer</text>
    <text x="788" y="115" fill="#76828f" font-size="10.5" text-anchor="middle">+ calibrated CI</text>

    <path d="M196 101 h54" stroke="#3a566a" stroke-width="1.5" marker-end="url(#a)"/>
    <path d="M422 101 h54" stroke="#3a566a" stroke-width="1.5" marker-end="url(#a)"/>
    <path d="M648 101 h54" stroke="#3a566a" stroke-width="1.5" marker-end="url(#a)"/>
  </g>

  <!-- band 2: live twin -->
  <text x="24" y="182" fill="#5a6571" font-size="10" letter-spacing="1.5">LIVE TWIN</text>
  <g>
    <rect x="24"  y="192" width="172" height="58" rx="9" fill="#10151b" stroke="#223039"/>
    <text x="110" y="218" fill="#d6dee6" font-size="12.5" text-anchor="middle">Engine</text>
    <text x="110" y="235" fill="#76828f" font-size="10.5" text-anchor="middle">8 tools · budget · MCP</text>

    <rect x="250" y="192" width="172" height="58" rx="9" fill="#10151b" stroke="#223039"/>
    <text x="336" y="218" fill="#d6dee6" font-size="12.5" text-anchor="middle">SSH tunnel</text>
    <text x="336" y="235" fill="#76828f" font-size="10.5" text-anchor="middle">jitter-buffered feed</text>

    <rect x="476" y="192" width="172" height="58" rx="9" fill="#10151b" stroke="#2f5a48"/>
    <text x="562" y="218" fill="#5cf2a2" font-size="12.5" text-anchor="middle">Isaac / PhysX</text>
    <text x="562" y="235" fill="#76828f" font-size="10.5" text-anchor="middle">GPU cluster</text>

    <rect x="702" y="192" width="172" height="58" rx="9" fill="#10151b" stroke="#6fb2d6"/>
    <text x="788" y="218" fill="#d6dee6" font-size="12.5" text-anchor="middle">Three.js</text>
    <text x="788" y="235" fill="#76828f" font-size="10.5" text-anchor="middle">live twin · you watch</text>

    <path d="M196 221 h54" stroke="#3a566a" stroke-width="1.5" marker-end="url(#a)"/>
    <path d="M422 221 h54" stroke="#3a566a" stroke-width="1.5" marker-end="url(#a)"/>
    <path d="M648 221 h54" stroke="#3a566a" stroke-width="1.5" marker-end="url(#a)"/>
    <!-- engine drives the DES (band 1) and the twin (band 2) -->
    <path d="M562 130 v40 M562 170 h-452 v22" stroke="#26333d" stroke-width="1.3" fill="none" stroke-dasharray="3 3"/>
  </g>

  <!-- band 3: how it's proven -->
  <text x="24" y="300" fill="#5a6571" font-size="10" letter-spacing="1.5">HOW IT'S PROVEN  (harness-computed, never self-reported)</text>
  <g>
    <rect x="24"  y="310" width="406" height="64" rx="9" fill="#0d1319" stroke="#223039"/>
    <text x="44" y="336" fill="#d6dee6" font-size="12.5">Held-out benchmark</text>
    <text x="44" y="356" fill="#76828f" font-size="10.5">decision accuracy · regret · calibration · vs LLM-alone / grid / OCBA</text>

    <rect x="468" y="310" width="406" height="64" rx="9" fill="#0d1319" stroke="#2f5a48"/>
    <text x="488" y="336" fill="#5cf2a2" font-size="12.5">DES vs PhysX fidelity</text>
    <text x="488" y="356" fill="#76828f" font-size="10.5">~10% median leg agreement · M/M/c-validated · byte-deterministic</text>
  </g>

  <text x="24" y="408" fill="#3f4854" font-size="10">LLMs guess at dynamics. Laplace runs the experiment.</text>

  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#3a566a"/>
    </marker>
  </defs>
</svg>
